<!DOCTYPE html>
<html lang="ja">
<head>

      border: 1px solid #cccccc;

      touch-action: none;

      cursor: grabbing;
    }

    /* 中央の間取りエリア */
    .stage-wrap {
      overflow: auto;
    }

    .stage {
      position: relative;
      width: 640px;
      height: 400px;
      background-color: #f8f9fa;

      overflow: hidden;

      position: absolute;
      inset: 0;

    .cell-layer,
    .wall-layer {
      pointer-events: none;

    .furniture-layer {
      pointer-events: none;
      z-index: 10;
    }

    .grid-cell {
      position: absolute;

      border: 1px solid #e6e6e6;
      background-color: #f7f7f7;

    .grid-cell.active {
      background-color: #ffffff;

    .stage.layout-mode .grid-cell {
      border: 1px dashed #cfcfcf;

    .stage.layout-mode .grid-cell.active {
      background-color: #fffdf2;
    }

    /* 外周の壁 */
    .wall {
      position: absolute;
      background-color: #333333;
      z-index: 4;
      pointer-events: none;
    }

    .wall.horizontal {
      height: 4px;
    }

    .wall.vertical {
      width: 4px;
    }

    /* 家具 */
    .placed-furniture {
      position: absolute;
      width: 90px;
      height: 70px;
      min-width: 40px;

      border: 2px solid #333333;
      border-radius: 8px;
      background-color: #e9ecef;

    .placed-furniture.selected .resize-handle {

    .handle-nw {

    .handle-n {

    .handle-s {

    /* 下の操作エリア */
    .control-area {
      background-color: #ffffff;

    }

    @media (max-width: 767px) {

  </style>
</head>

  <script>
    // ================================
    // 基本設定
    // ================================
    const COLS = 16;
    const ROWS = 10;
    const CELL = 40;

    const stage = document.getElementById("stage");
    const cellLayer = document.getElementById("cellLayer");
    const wallLayer = document.getElementById("wallLayer");
    const furnitureLayer = document.getElementById("furnitureLayer");

    const door = document.getElementById("door");
    const doorPath = document.getElementById("doorPath");

    const furnitureList = document.getElementById("furnitureList");
    const openAddFormButton = document.getElementById("openAddFormButton");
    const closeAddFormButton = document.getElementById("closeAddFormButton");
    const addForm = document.getElementById("addForm");
    const customFurnitureName = document.getElementById("customFurnitureName");
    const addFurnitureButton = document.getElementById("addFurnitureButton");

    const layoutModeButton = document.getElementById("layoutModeButton");
    const furnitureModeButton = document.getElementById("furnitureModeButton");
    const paintAddButton = document.getElementById("paintAddButton");
    const paintEraseButton = document.getElementById("paintEraseButton");
    const judgeButton = document.getElementById("judgeButton");
    const deleteButton = document.getElementById("deleteButton");
    const resetButton = document.getElementById("resetButton");
    const resultBox = document.getElementById("resultBox");
    const modeNote = document.getElementById("modeNote");

    let currentMode = "furniture";
    let paintMode = "add";

    let activeCells = new Set();

    let doorState = {
      row: 1,
      col: 7,
      side: "top"
    };

    let selectedFurniture = null;
    let draggingElement = null;
    let pointerMode = null;

    let offsetX = 0;
    let offsetY = 0;

    let resizeData = null;
    let isPainting = false;

    const minFurnitureSize = 40;

    // ================================
    // 初期の間取り
    // ================================
    function setInitialRoom() {
      activeCells.clear();

      // 小さめの長方形から開始
      for (let row = 1; row <= 7; row++) {
        for (let col = 3; col <= 12; col++) {
          activeCells.add(cellKey(row, col));
        }
      }

      doorState = {
        row: 1,
        col: 7,
        side: "top"
      };
    }

    function cellKey(row, col) {
      return row + "," + col;
    }

    function hasCell(row, col) {
      return activeCells.has(cellKey(row, col));
    }

    // ================================
    // マス目と壁を描画
    // ================================
    function renderRoom() {
      renderCells();
      renderWalls();

      if (!isValidDoorPosition()) {
        snapDoorToFirstEdge();
      }

      updateDoorView();
      resetResult();
    }

    function renderCells() {
      cellLayer.innerHTML = "";

      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const cell = document.createElement("div");

          cell.className = "grid-cell";

          if (hasCell(row, col)) {
            cell.classList.add("active");
          }

          cell.style.left = col * CELL + "px";
          cell.style.top = row * CELL + "px";

          cellLayer.appendChild(cell);
        }
      }
    }

    function renderWalls() {
      wallLayer.innerHTML = "";

      activeCells.forEach(key => {
        const parts = key.split(",");
        const row = Number(parts[0]);
        const col = Number(parts[1]);

        if (!hasCell(row - 1, col)) {
          addWall("horizontal", col * CELL, row * CELL, CELL, 4);
        }

        if (!hasCell(row + 1, col)) {
          addWall("horizontal", col * CELL, (row + 1) * CELL - 4, CELL, 4);
        }

        if (!hasCell(row, col - 1)) {
          addWall("vertical", col * CELL, row * CELL, 4, CELL);
        }

        if (!hasCell(row, col + 1)) {
          addWall("vertical", (col + 1) * CELL - 4, row * CELL, 4, CELL);
        }
      });
    }

    function addWall(type, left, top, width, height) {
      const wall = document.createElement("div");

      wall.className = "wall " + type;
      wall.style.left = left + "px";
      wall.style.top = top + "px";
      wall.style.width = width + "px";
      wall.style.height = height + "px";

      wallLayer.appendChild(wall);
    }

    // ================================
    // モード切り替え
    // ================================
    layoutModeButton.addEventListener("click", () => {
      setMode("layout");
    });

    furnitureModeButton.addEventListener("click", () => {
      setMode("furniture");
    });

    function setMode(mode) {
      currentMode = mode;
      clearSelection();

      if (mode === "layout") {
        stage.classList.remove("furniture-mode");
        stage.classList.add("layout-mode");

        layoutModeButton.classList.remove("btn-outline-primary");
        layoutModeButton.classList.add("btn-primary");

        furnitureModeButton.classList.remove("btn-primary");
        furnitureModeButton.classList.add("btn-outline-primary");

        paintAddButton.disabled = false;
        paintEraseButton.disabled = false;
        deleteButton.disabled = true;

        modeNote.textContent = "間取り編集モード：マスをクリック、またはクリックしたままなぞると部屋をまとめて追加・削除できます。";
      }

      if (mode === "furniture") {
        stage.classList.remove("layout-mode");
        stage.classList.add("furniture-mode");

        furnitureModeButton.classList.remove("btn-outline-primary");
        furnitureModeButton.classList.add("btn-primary");

        layoutModeButton.classList.remove("btn-primary");
        layoutModeButton.classList.add("btn-outline-primary");

        paintAddButton.disabled = true;
        paintEraseButton.disabled = true;

        modeNote.textContent = "家具配置モード：左の家具を間取りにドラッグできます。出口は外周の壁に沿って動きます。";
      }
    }

    paintAddButton.addEventListener("click", () => {
      paintMode = "add";
      paintAddButton.classList.remove("btn-outline-success");
      paintAddButton.classList.add("btn-success");
      paintEraseButton.classList.remove("btn-success");
      paintEraseButton.classList.add("btn-outline-success");
    });

    paintEraseButton.addEventListener("click", () => {
      paintMode = "erase";
      paintEraseButton.classList.remove("btn-outline-success");
      paintEraseButton.classList.add("btn-success");
      paintAddButton.classList.remove("btn-success");
      paintAddButton.classList.add("btn-outline-success");
    });

    // ================================
    // 間取りをクリック、ドラッグで追加・削除
    // ================================
    stage.addEventListener("pointerdown", event => {
      if (currentMode !== "layout") return;
      if (event.target.closest(".placed-furniture")) return;
      if (event.target.closest(".door-plan")) return;

      event.preventDefault();

      isPainting = true;
      paintCellAtPointer(event.clientX, event.clientY);

      document.addEventListener("pointermove", onPaintMove);
      document.addEventListener("pointerup", stopPainting);
    });

    function onPaintMove(event) {
      if (!isPainting) return;

      paintCellAtPointer(event.clientX, event.clientY);
    }

    function stopPainting() {
      isPainting = false;

      document.removeEventListener("pointermove", onPaintMove);
      document.removeEventListener("pointerup", stopPainting);
    }

    function paintCellAtPointer(clientX, clientY) {
      const pos = getStagePosition(clientX, clientY);

      if (!pos) return;

      const col = Math.floor(pos.x / CELL);
      const row = Math.floor(pos.y / CELL);

      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;

      const key = cellKey(row, col);

      if (paintMode === "add") {
        activeCells.add(key);
      }

      if (paintMode === "erase") {
        // 部屋が全部なくならないようにする
        if (activeCells.size > 1) {
          activeCells.delete(key);
        }
      }

      renderRoom();
    }

    // ================================
    // 家具リストからドラッグして追加
    // ================================
    furnitureList.addEventListener("pointerdown", event => {
      if (currentMode !== "furniture") return;

      const item = event.target.closest(".furniture-item");
      if (!item) return;

      event.preventDefault();

      const name = item.dataset.name;
      const width = Number(item.dataset.width);
      const height = Number(item.dataset.height);

      const newFurniture = createFurniture(name, width, height);

      document.body.appendChild(newFurniture);

      draggingElement = newFurniture;
      pointerMode = "newFurniture";

      offsetX = width / 2;
      offsetY = height / 2;

      newFurniture.classList.add("dragging");

      moveElementOnPage(event.pageX, event.pageY);

      document.addEventListener("pointermove", onPointerMove);
      document.addEventListener("pointerup", onPointerUp);
    });

    function createFurniture(name, width, height) {
      const furniture = document.createElement("div");

      furniture.className = "placed-furniture";
      furniture.dataset.name = name;
      furniture.style.width = width + "px";
      furniture.style.height = height + "px";

      const label = document.createElement("span");
      label.className = "furniture-label";
      label.textContent = name;

      furniture.appendChild(label);

      addResizeHandles(furniture);
      makeFurnitureMovable(furniture);

      return furniture;
    }

    function makeFurnitureMovable(furniture) {
      furniture.addEventListener("pointerdown", event => {
        if (currentMode !== "furniture") return;
        if (event.target.classList.contains("resize-handle")) return;

        event.preventDefault();
        event.stopPropagation();

        selectFurniture(furniture);

        draggingElement = furniture;
        pointerMode = "moveFurniture";

        const rect = furniture.getBoundingClientRect();

        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;

        document.addEventListener("pointermove", onPointerMove);
        document.addEventListener("pointerup", onPointerUp);
      });
    }

    // ================================
    // 家具の選択
    // ================================
    stage.addEventListener("pointerdown", event => {
      if (currentMode !== "furniture") return;

      if (event.target === stage || event.target === furnitureLayer) {
        clearSelection();
      }
    });

    function selectFurniture(furniture) {
      clearSelection();

      selectedFurniture = furniture;
      selectedFurniture.classList.add("selected");
      deleteButton.disabled = false;
    }

    function clearSelection() {
      if (selectedFurniture) {
        selectedFurniture.classList.remove("selected");
      }

      selectedFurniture = null;
      deleteButton.disabled = true;
    }

    // ================================
    // サイズ変更用の点
    // ================================
    function addResizeHandles(furniture) {
      const directions = ["nw", "n", "ne", "e", "se", "s", "sw", "w"];

      directions.forEach(direction => {
        const handle = document.createElement("span");

        handle.className = "resize-handle handle-" + direction;
        handle.dataset.direction = direction;

        handle.addEventListener("pointerdown", event => {
          if (currentMode !== "furniture") return;

          event.preventDefault();
          event.stopPropagation();

          startResize(event, furniture, direction);
        });

        furniture.appendChild(handle);
      });
    }

    function startResize(event, furniture, direction) {
      selectFurniture(furniture);

      draggingElement = furniture;
      pointerMode = "resizeFurniture";

      resizeData = {
        direction: direction,
        startX: event.clientX,
        startY: event.clientY,
        startLeft: furniture.offsetLeft,
        startTop: furniture.offsetTop,
        startWidth: furniture.offsetWidth,
        startHeight: furniture.offsetHeight
      };

      document.addEventListener("pointermove", onPointerMove);
      document.addEventListener("pointerup", onPointerUp);
    }

    // ================================
    // ドアを外周の壁に沿って動かす
    // ================================
    door.addEventListener("pointerdown", event => {
      if (currentMode !== "furniture") return;

      event.preventDefault();
      event.stopPropagation();

      clearSelection();

      draggingElement = door;
      pointerMode = "moveDoor";

      document.addEventListener("pointermove", onPointerMove);
      document.addEventListener("pointerup", onPointerUp);
    });

    function moveDoorToNearestEdge(clientX, clientY) {
      const pos = getStagePosition(clientX, clientY);
      if (!pos) return;

      const edges = getExteriorEdges();
      if (edges.length === 0) return;

      let bestEdge = edges[0];
      let bestDistance = Infinity;

      edges.forEach(edge => {
        const distance = distanceToSegment(
          pos.x,
          pos.y,
          edge.x1,
          edge.y1,
          edge.x2,
          edge.y2
        );

        if (distance < bestDistance) {
          bestDistance = distance;
          bestEdge = edge;
        }
      });

      doorState = {
        row: bestEdge.row,
        col: bestEdge.col,
        side: bestEdge.side
      };

      updateDoorView();
      resetResult();
    }

    function getExteriorEdges() {
      const edges = [];

      activeCells.forEach(key => {
        const parts = key.split(",");
        const row = Number(parts[0]);
        const col = Number(parts[1]);

        if (!hasCell(row - 1, col)) {
          edges.push({
            row,
            col,
            side: "top",
            x1: col * CELL,
            y1: row * CELL,
            x2: (col + 1) * CELL,
            y2: row * CELL
          });
        }

        if (!hasCell(row + 1, col)) {
          edges.push({
            row,
            col,
            side: "bottom",
            x1: col * CELL,
            y1: (row + 1) * CELL,
            x2: (col + 1) * CELL,
            y2: (row + 1) * CELL
          });
        }

        if (!hasCell(row, col - 1)) {
          edges.push({
            row,
            col,
            side: "left",
            x1: col * CELL,
            y1: row * CELL,
            x2: col * CELL,
            y2: (row + 1) * CELL
          });
        }

        if (!hasCell(row, col + 1)) {
          edges.push({
            row,
            col,
            side: "right",
            x1: (col + 1) * CELL,
            y1: row * CELL,
            x2: (col + 1) * CELL,
            y2: (row + 1) * CELL
          });
        }
      });

      return edges;
    }

    function isValidDoorPosition() {
      return isExteriorEdge(doorState.row, doorState.col, doorState.side);
    }

    function isExteriorEdge(row, col, side) {
      if (!hasCell(row, col)) return false;

      if (side === "top") return !hasCell(row - 1, col);
      if (side === "bottom") return !hasCell(row + 1, col);
      if (side === "left") return !hasCell(row, col - 1);
      if (side === "right") return !hasCell(row, col + 1);

      return false;
    }

    function snapDoorToFirstEdge() {
      const edges = getExteriorEdges();

      if (edges.length === 0) {
        door.style.display = "none";
        return;
      }

      door.style.display = "block";

      doorState = {
        row: edges[0].row,
        col: edges[0].col,
        side: edges[0].side
      };
    }

    function updateDoorView() {
      if (!hasCell(doorState.row, doorState.col)) {
        snapDoorToFirstEdge();
      }

      door.style.display = "block";

      door.classList.remove("top", "bottom", "left", "right");
      door.classList.add(doorState.side);

      door.style.left = doorState.col * CELL + "px";
      door.style.top = doorState.row * CELL + "px";

      if (doorState.side === "top") {
        doorPath.setAttribute("d", "M4 2 L4 36 M4 36 A36 36 0 0 1 40 2");
      }

      if (doorState.side === "bottom") {
        doorPath.setAttribute("d", "M4 38 L4 4 M4 4 A36 36 0 0 0 40 38");
      }

      if (doorState.side === "left") {
        doorPath.setAttribute("d", "M2 4 L36 4 M36 4 A36 36 0 0 1 2 40");
      }

      if (doorState.side === "right") {
        doorPath.setAttribute("d", "M38 4 L4 4 M4 4 A36 36 0 0 0 38 40");
      }
    }

    // ================================
    // ドラッグ共通処理
    // ================================
    function onPointerMove(event) {
      if (pointerMode === "newFurniture") {
        moveElementOnPage(event.pageX, event.pageY);
      }

      if (pointerMode === "moveFurniture") {
        moveFurnitureInStage(event.clientX, event.clientY);
      }

      if (pointerMode === "resizeFurniture") {
        resizeFurniture(event.clientX, event.clientY);
      }

      if (pointerMode === "moveDoor") {
        moveDoorToNearestEdge(event.clientX, event.clientY);
      }
    }

    function onPointerUp(event) {
      if (pointerMode === "newFurniture") {
        placeNewFurniture(event);
      }

      draggingElement = null;
      pointerMode = null;
      resizeData = null;

      document.removeEventListener("pointermove", onPointerMove);
      document.removeEventListener("pointerup", onPointerUp);
    }

    function placeNewFurniture(event) {
      const stageRect = stage.getBoundingClientRect();

      const isInsideStage =
        event.clientX >= stageRect.left &&
        event.clientX <= stageRect.right &&
        event.clientY >= stageRect.top &&
        event.clientY <= stageRect.bottom;

      if (!isInsideStage) {
        draggingElement.remove();
        return;
      }

      furnitureLayer.appendChild(draggingElement);
      draggingElement.classList.remove("dragging");

      moveFurnitureInStage(event.clientX, event.clientY);
      selectFurniture(draggingElement);
      resetResult();
    }

    function moveElementOnPage(pageX, pageY) {
      draggingElement.style.left = pageX - offsetX + "px";
      draggingElement.style.top = pageY - offsetY + "px";
    }

    function moveFurnitureInStage(clientX, clientY) {
      const stageRect = stage.getBoundingClientRect();

      let x = clientX - stageRect.left - offsetX;
      let y = clientY - stageRect.top - offsetY;

      x = Math.max(0, Math.min(x, stage.clientWidth - draggingElement.offsetWidth));
      y = Math.max(0, Math.min(y, stage.clientHeight - draggingElement.offsetHeight));

      draggingElement.style.left = x + "px";
      draggingElement.style.top = y + "px";

      resetResult();
    }

    // ================================
    // 家具サイズ変更
    // ================================
    function resizeFurniture(clientX, clientY) {
      if (!resizeData || !draggingElement) return;

      const direction = resizeData.direction;
      const dx = clientX - resizeData.startX;
      const dy = clientY - resizeData.startY;

      let newLeft = resizeData.startLeft;
      let newTop = resizeData.startTop;
      let newWidth = resizeData.startWidth;
      let newHeight = resizeData.startHeight;

      if (direction.includes("e")) {
        newWidth = resizeData.startWidth + dx;
      }

      if (direction.includes("s")) {
        newHeight = resizeData.startHeight + dy;
      }

      if (direction.includes("w")) {
        newWidth = resizeData.startWidth - dx;
        newLeft = resizeData.startLeft + dx;
      }

      if (direction.includes("n")) {
        newHeight = resizeData.startHeight - dy;
        newTop = resizeData.startTop + dy;
      }

      if (newWidth < minFurnitureSize) {
        if (direction.includes("w")) {
          newLeft = resizeData.startLeft + resizeData.startWidth - minFurnitureSize;
        }

        newWidth = minFurnitureSize;
      }

      if (newHeight < minFurnitureSize) {
        if (direction.includes("n")) {
          newTop = resizeData.startTop + resizeData.startHeight - minFurnitureSize;
        }

        newHeight = minFurnitureSize;
      }

      if (newLeft < 0) {
        newWidth += newLeft;
        newLeft = 0;
      }

      if (newTop < 0) {
        newHeight += newTop;
        newTop = 0;
      }

      if (newLeft + newWidth > stage.clientWidth) {
        newWidth = stage.clientWidth - newLeft;
      }

      if (newTop + newHeight > stage.clientHeight) {
        newHeight = stage.clientHeight - newTop;
      }

      newWidth = Math.max(minFurnitureSize, newWidth);
      newHeight = Math.max(minFurnitureSize, newHeight);

      draggingElement.style.left = newLeft + "px";
      draggingElement.style.top = newTop + "px";
      draggingElement.style.width = newWidth + "px";
      draggingElement.style.height = newHeight + "px";

      resetResult();
    }

    // ================================
    // 自分で家具を追加
    // ================================
    openAddFormButton.addEventListener("click", () => {
      addForm.classList.add("show");
      customFurnitureName.focus();
    });

    closeAddFormButton.addEventListener("click", () => {
      addForm.classList.remove("show");
      customFurnitureName.value = "";
    });

    addFurnitureButton.addEventListener("click", () => {
      addCustomFurniture();
    });

    customFurnitureName.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        addCustomFurniture();
      }
    });

    function addCustomFurniture() {
      const name = customFurnitureName.value.trim();

      if (name === "") {
        alert("家具名を入力してください。");
        return;
      }

      const item = document.createElement("div");

      item.className = "furniture-item";
      item.dataset.name = name;
      item.dataset.width = "90";
      item.dataset.height = "70";
      item.textContent = name;

      furnitureList.appendChild(item);

      customFurnitureName.value = "";
      addForm.classList.remove("show");
    }

    // ================================
    // 選択した家具だけ削除
    // ================================
    deleteButton.addEventListener("click", () => {
      if (!selectedFurniture) return;

      selectedFurniture.remove();
      clearSelection();
      resetResult();
    });

    // ================================
    // リセット
    // ================================
    resetButton.addEventListener("click", () => {
      furnitureLayer.innerHTML = "";

      clearSelection();
      setInitialRoom();
      renderRoom();
      setMode("furniture");
      resetResult();
    });

    // ================================
    // 判定
    // 結果は危険度だけ表示
    // ================================
    judgeButton.addEventListener("click", () => {
      const furnitureItems = Array.from(document.querySelectorAll(".placed-furniture"));

      if (furnitureItems.length === 0) {
        showRisk("低");
        return;
      }

      let dangerPoint = 0;

      const doorZone = getDoorDangerZone();

      furnitureItems.forEach(furniture => {
        const rect = getStageRect(furniture);

        // 家具が部屋の形からはみ出していると危険
        if (!isFurnitureInsideRoom(rect)) {
          dangerPoint += 2;
        }

        // 出口付近に家具があると危険
        if (doorZone && isOverlap(rect, doorZone)) {
          dangerPoint += 2;
        }

        // 大きい家具は危険度を少し上げる
        if (furniture.offsetWidth >= 130 || furniture.offsetHeight >= 130) {
          dangerPoint += 1;
        }
      });

      // 家具同士が重なっていると危険
      for (let i = 0; i < furnitureItems.length; i++) {
        for (let j = i + 1; j < furnitureItems.length; j++) {
          const rectA = getStageRect(furnitureItems[i]);
          const rectB = getStageRect(furnitureItems[j]);

          if (isOverlap(rectA, rectB)) {
            dangerPoint += 1;
          }
        }
      }

      // 家具が多いと通路が狭くなりやすい
      if (furnitureItems.length >= 6) {
        dangerPoint += 2;
      } else if (furnitureItems.length >= 4) {
        dangerPoint += 1;
      }

      if (dangerPoint >= 5) {
        showRisk("高");
      } else if (dangerPoint >= 2) {
        showRisk("中");
      } else {
        showRisk("低");
      }
    });

    function showRisk(level) {
      resultBox.classList.remove("risk-none", "risk-low", "risk-middle", "risk-high");

      if (level === "高") {
        resultBox.textContent = "判定結果：危険度 高";
        resultBox.classList.add("risk-high");
      }

      if (level === "中") {
        resultBox.textContent = "判定結果：危険度 中";
        resultBox.classList.add("risk-middle");
      }

      if (level === "低") {
        resultBox.textContent = "判定結果：危険度 低";
        resultBox.classList.add("risk-low");
      }
    }

    function resetResult() {
      resultBox.textContent = "判定結果：未判定";
      resultBox.classList.remove("risk-low", "risk-middle", "risk-high");
      resultBox.classList.add("risk-none");
    }

    // ================================
    // 判定用の計算
    // ================================
    function getStageRect(element) {
      return {
        left: element.offsetLeft,
        top: element.offsetTop,
        right: element.offsetLeft + element.offsetWidth,
        bottom: element.offsetTop + element.offsetHeight,
        width: element.offsetWidth,
        height: element.offsetHeight
      };
    }

    function isFurnitureInsideRoom(rect) {
      if (rect.left < 0 || rect.top < 0 || rect.right > stage.clientWidth || rect.bottom > stage.clientHeight) {
        return false;
      }

      const startCol = Math.floor(rect.left / CELL);
      const endCol = Math.floor((rect.right - 1) / CELL);
      const startRow = Math.floor(rect.top / CELL);
      const endRow = Math.floor((rect.bottom - 1) / CELL);

      for (let row = startRow; row <= endRow; row++) {
        for (let col = startCol; col <= endCol; col++) {
          if (!hasCell(row, col)) {
            return false;
          }
        }
      }

      return true;
    }

    function getDoorDangerZone() {
      const row = doorState.row;
      const col = doorState.col;
      const side = doorState.side;

      if (!hasCell(row, col)) return null;

      if (side === "top") {
        return {
          left: col * CELL,
          top: row * CELL,
          right: (col + 1) * CELL,
          bottom: row * CELL + 70
        };
      }

      if (side === "bottom") {
        return {
          left: col * CELL,
          top: (row + 1) * CELL - 70,
          right: (col + 1) * CELL,
          bottom: (row + 1) * CELL
        };
      }

      if (side === "left") {
        return {
          left: col * CELL,
          top: row * CELL,
          right: col * CELL + 70,
          bottom: (row + 1) * CELL
        };
      }

      if (side === "right") {
        return {
          left: (col + 1) * CELL - 70,
          top: row * CELL,
          right: (col + 1) * CELL,
          bottom: (row + 1) * CELL
        };
      }

      return null;
    }

    function isOverlap(rectA, rectB) {
      return !(
        rectA.right <= rectB.left ||
        rectA.left >= rectB.right ||
        rectA.bottom <= rectB.top ||
        rectA.top >= rectB.bottom
      );
    }

    function distanceToSegment(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;

      if (dx === 0 && dy === 0) {
        return Math.hypot(px - x1, py - y1);
      }

      let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);

      t = Math.max(0, Math.min(1, t));

      const closestX = x1 + t * dx;
      const closestY = y1 + t * dy;

      return Math.hypot(px - closestX, py - closestY);
    }

    function getStagePosition(clientX, clientY) {
      const rect = stage.getBoundingClientRect();

      const x = clientX - rect.left;
      const y = clientY - rect.top;

      if (x < 0 || y < 0 || x > stage.clientWidth || y > stage.clientHeight) {
        return null;
      }

      return { x, y };
    }

    // ================================
    // 初期化
    // ================================
    setInitialRoom();
    renderRoom();
    setMode("furniture");
    resetResult();
  </script>

</body>
